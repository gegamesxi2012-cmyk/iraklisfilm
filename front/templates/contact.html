{% load static %}
<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>კონტაქტი</title>
    
    <link rel="stylesheet" href="{% static 'styleC.css' %}">
<link rel="icon" href="{% static 'logo2.png' %}" type="image/x-icon">
</head>
<body>
    <div class="menu">
        <img src="{% static 'logo2.png' %}" alt="Logo">
        <audio id="hoverSound" src="{% static 'ClickSound.mp3' %}" preload="auto"></audio>
        <a href="{% url 'home_page' %}"><button>მთავარი</button></a>
        <input type="search" placeholder="ძიება...">
        <a href="{% url 'signup_page' %}"><button id="register">რეგისტრაცია</button></a>
        <a href="{% url 'signin' %}"><button id="login">შესვლა</button></a>
        <a href="{%url 'main_page'%}"><button>გალერეა</button></a>
    </div>

    <div class="mainDiv">
        <div class="content">
            <form method="POST">
                {% csrf_token %}
                <input type="tel" name="phone" placeholder="შეიყვანეთ თქვენი საკონტაქტო ნომერი" required>
                <input type="text" name="subject" placeholder="შეიყვანეთ რას ეხება თემა (არასავალდებულო)">
                <textarea name="message_text" placeholder="დაწერეთ თქვენი სათქმელი" id="mainTxt" required></textarea>
                <button type="submit">გაგზავნა</button>
            </form>
        </div>
    </div>

    <script src="{% static 'script.js' %}"></script>
</body>
</html>
