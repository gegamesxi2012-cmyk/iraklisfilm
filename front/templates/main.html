{% load static %}
<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ფილმები</title>
    <link rel="icon" href="{% static 'logo2.png' %}" type="image/x-icon">
    
    <style>
        body {
            margin: 0;
            position: relative;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("{% static '555.jpg' %}");
            filter: invert(100%);
            background-size: cover;
            background-repeat: no-repeat;
            z-index: -1;
            width: 100vw;
            height: 100vh;
        }

        .header {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 20px;
        }

        .search {
            width: 90vw;
            height: 35px;
            border-radius: 5px;
            border: 2px solid #333;
            background-color: rgba(255, 255, 255, 0.8);
            box-shadow: none;
            padding: 0 10px;
        }

       .main {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); /* 320-დან 280-მდე დავაკელით */
    gap: 20px;
    padding: 20px;
    max-width: 1300px;
    margin: 0 auto;
}

.movie-card iframe {
    width: 100%;
    aspect-ratio: 16 / 9; /* ეს უფრო სწორია ვიდრე ფიქსირებული სიმაღლე */
    border: none;
}

        .movie-card iframe {
            width: 100%;
            height: 200px;
            border: none;
        }

        .movie-card p {
            color: aliceblue;
            background-color: rgba(255, 94, 0, 0.8);
            padding: 8px 12px;
            margin: 12px 0 5px 0;
            width: 85%;
            text-align: center;
            border-radius: 5px;
            font-weight: bold;
        }

        .movie-card small {
            color: #eee;
            padding: 0 10px 15px 10px;
            text-align: center;
        }
    </style>

    <!-- <script src="{% static 'script.js' %}" defer></script> -->
</head>
<body>
    <div class="header">
    <form action="{% url 'main_page' %}" method="GET"> 
        <input type="search" name="q" class="search" placeholder="შეიყვანეთ ფილმის სათაური" value="{{ request.GET.q }}">
    </form>
</div>

    <div class="main">
        {% for movie in movies %}
            <div class="movie-card">
                <iframe
                    src="{{ movie.video_url }}"
                    title="{{ movie.title }}"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen>
                </iframe>
                <p>{{ movie.title }}</p>
                <small>{{ movie.description }}</small>
            </div>
        {% empty %}
            <p class="no-movies">ფილმები ჯერ არ არის დამატებული.</p>
        {% endfor %}
    </div>
</body>
</html>
