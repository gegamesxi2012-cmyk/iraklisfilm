<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ფილმების მართვის პანელი</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .admin-panel {
            background-color: #262626;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 400px;
            border: 1px solid #333;
        }
        h2 {
            text-align: center;
            color: #f39c12;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #bbb;
        }
        input[type="text"], 
        input[type="number"],
        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #333;
            color: white;
            box-sizing: border-box;
        }
        input[type="file"] {
            color: #bbb;
            font-size: 13px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #f39c12;
            border: none;
            border-radius: 6px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #e67e22;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #777;
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="admin-panel">
    <h2>🎬 ფილმის ატვირთვა</h2>
    
    <form action="" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="form-group">
            <label>ფილმის დასახელება</label>
            <input type="text" name="movie_title" placeholder="მაგ: მატრიცა" required>
        </div>

        <div class="form-group">
            <label>აღწერა</label>
            <textarea name="movie_description" rows="3" placeholder="მოკლე შინაარსი..."></textarea>
        </div>

        <div class="form-group">
            <label>ფილმის ფაილი (MP4, MKV)</label>
            <input type="file" name="movie_file" accept="video/*" required>
        </div>

        <div class="form-group">
            <label>პოსტერი (სურათი)</label>
            <input type="file" name="movie_poster" accept="image/*">
        </div>

        <button type="submit">ატვირთვის დაწყება</button>
    </form>

    <a href="/" class="back-link">← მთავარზე დაბრუნება</a>
</div>

</body>
</html>
